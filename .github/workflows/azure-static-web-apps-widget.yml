name: Azure Static Web Apps CI/CD (chat widget)

# Deploys only web/ (the static chat widget) to Azure Static Web Apps.
# The FastAPI backend is a separate deployment -- see
# azure-container-apps-backend.yml and AZURE_DEPLOYMENT.md.
#
# Setup required before this workflow can run (see AZURE_DEPLOYMENT.md):
#   1. Create an Azure Static Web App resource pointed at this repo.
#   2. Add its deployment token as the repo secret named below.
#   3. Edit web/config.js to point API_BASE_URL at the deployed backend.

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/azure-static-web-apps-widget.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "web/**"
  workflow_dispatch: {}

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # No OIDC id-token step here on purpose: Azure's OIDC verification for
      # Static Web Apps requires the workflow FILENAME to match its own
      # auto-generated convention (azure-static-web-apps-<adjective>-<noun>-
      # <hex>.yml) so it can correlate the workflow_ref claim back to a
      # specific SWA resource. Ours is custom-named, so that correlation
      # fails with "Could not determine the Static Web App from the GitHub
      # OIDC workflow reference" -- confirmed live. The deployment token
      # below (azure_static_web_apps_api_token) already authenticates
      # directly against this specific SWA resource and doesn't care about
      # the filename at all, so OIDC isn't needed here.
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_FINANCE_WIDGET }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "/web" # the widget lives in web/, not the repo root
          api_location: "" # no Azure Functions API -- the backend is deployed separately
          output_location: "" # pure static files, no build step
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_FINANCE_WIDGET }}
          action: "close"
