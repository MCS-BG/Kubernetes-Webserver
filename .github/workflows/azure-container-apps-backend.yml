name: Azure Container Apps CD (backend API)

# Builds this repo's Dockerfile, pushes it to Azure Container Registry, and
# updates an existing Azure Container App to run the new image.
#
# Setup required before this workflow can run (see AZURE_DEPLOYMENT.md):
#   1. An Azure Container Registry (ACR).
#   2. An existing Azure Container App + environment (created once via
#      `az containerapp create`, including the ALLOWED_ORIGINS env var it
#      needs -- ANTHROPIC_API_KEY is synced on every deploy by this
#      workflow itself, see the "Sync ANTHROPIC_API_KEY" step below).
#   3. A service principal with push access to the ACR and contributor
#      access to the Container App's resource group, stored as the repo
#      secret AZURE_CREDENTIALS (the JSON from `az ad sp create-for-rbac`).
#   4. The repo secret ANTHROPIC_API_KEY (the chat agent's API key).
#   5. The repo variables/secrets below set to match your resources.
#
# This workflow deliberately uses plain `az` CLI calls rather than a
# higher-level "deploy" GitHub Action -- fewer moving parts to verify, and
# the exact commands are easy to read and adjust.

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/azure-container-apps-backend.yml"
  workflow_dispatch: {}

env:
  ACR_NAME: ${{ vars.ACR_NAME }} # e.g. "financeclosereg" (no .azurecr.io suffix)
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
  IMAGE_NAME: finance-close-platform

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image via ACR Tasks
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ github.sha }}" \
            --image "$IMAGE_NAME:latest" \
            .

      - name: Sync ANTHROPIC_API_KEY into the Container App
        run: |
          az containerapp secret set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --secrets anthropic-api-key="${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Deploy new image to the Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}" \
            --set-env-vars ANTHROPIC_API_KEY=secretref:anthropic-api-key
