apiVersion: v1
kind: ConfigMap
metadata:
  name: tilley-web-files
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Tilley Time 💕</title>
      <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
      <header>
        <h1>Tilley Time</h1>
        <p>Our sweet girl's favorite moments</p>
      </header>

      <section class="controls">
        <label for="photo-upload" class="upload-btn">📸 Add Photos</label>
        <input type="file" id="photo-upload" accept="image/*" multiple hidden/>
        
        <input type="text" id="search" placeholder="Search photos..." oninput="filterPhotos()"/>
      </section>

      <div id="gallery" class="gallery"></div>

      <!-- Lightbox -->
      <div id="lightbox" class="lightbox hidden">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="Full photo"/>
      </div>

      <script src="script.js"></script>
    </body>
    </html>

  style.css: |
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #fff0f5, #f8e1e9);
  color: #333;
  min-height: 100vh;
  padding: 20px;
}

header {
  text-align: center;
  margin: 40px 0 30px;
}

h1 {
  font-size: 3.5rem;
  color: #ff69b4;
  text-shadow: 2px 2px 8px rgba(255,105,180,0.3);
}

header p {
  font-size: 1.4rem;
  color: #ff1493;
  margin-top: 8px;
}

.controls {
  max-width: 900px;
  margin: 0 auto 30px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.upload-btn {
  background: #ff69b4;
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}

.upload-btn:hover {
  background: #ff1493;
  transform: scale(1.05);
}

#search {
  padding: 12px 20px;
  font-size: 1.1rem;
  border: 2px solid #ffb6c1;
  border-radius: 30px;
  width: 300px;
  max-width: 100%;
}

.gallery {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 0 10px;
}

.photo-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  transition: transform 0.25s, box-shadow 0.25s;
  cursor: pointer;
}

.photo-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 16px 40px rgba(255,105,180,0.3);
}

.photo-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
}

.close {
  position: absolute;
  top: 30px;
  right: 30px;
  font-size: 60px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.hidden { display: none !important; }

@media (max-width: 600px) {
  h1 { font-size: 2.8rem; }
  .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}

  script.js: |
const gallery = document.getElementById('gallery');
const searchInput = document.getElementById('search');
const uploadInput = document.getElementById('photo-upload');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

let photos = [];

// Load from localStorage
function loadPhotos() {
  const saved = localStorage.getItem('tilleyPhotos');
  if (saved) {
    photos = JSON.parse(saved);
    renderGallery();
  }
}

// Save to localStorage
function savePhotos() {
  localStorage.setItem('tilleyPhotos', JSON.stringify(photos));
}

// Render thumbnails
function renderGallery(filter = '') {
  gallery.innerHTML = '';
  const filtered = photos.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  
  filtered.forEach((photo, index) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `<img src="${photo.url}" alt="${photo.name}" loading="lazy">`;
    card.onclick = () => showLightbox(photo.url);
    gallery.appendChild(card);
  });
}

// Show full image
function showLightbox(url) {
  lightboxImg.src = url;
  lightbox.classList.remove('hidden');
}

// Close lightbox
function closeLightbox() {
  lightbox.classList.add('hidden');
}

// Handle upload
uploadInput.addEventListener('change', (e) => {
  for (let file of e.target.files) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      photos.push({ name: file.name, url: ev.target.result });
      savePhotos();
      renderGallery(searchInput.value);
    };
    reader.readAsDataURL(file);
  }
});

// Filter on search input
function filterPhotos() {
  renderGallery(searchInput.value);
}

// Init
loadPhotos();
lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
