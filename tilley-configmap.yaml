apiVersion: v1
kind: ConfigMap
metadata:
  name: tilley-web-files
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Tilley Time 💕</title>
      <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
      <header>
        <h1>Tilley Time</h1>
        <p>Our sweet girl's favorite moments</p>
      </header>

      <section class="controls">
        <label for="photo-upload" class="upload-btn">📸 Add Photos</label>
        <input type="file" id="photo-upload" accept="image/*" multiple hidden/>
        
        <input type="text" id="search" placeholder="Search photos..." oninput="filterPhotos()"/>
      </section>

      <div id="gallery" class="gallery"></div>

      <!-- Lightbox -->
      <div id="lightbox" class="lightbox hidden">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="Full photo"/>
      </div>

      <script src="script.js"></script>
    </body>
    </html>

  style.css: |
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff0f5, #f8e1e9);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin: 40px 0 30px;
    }

    h1 {
      font-size: 3.5rem;
      color: #ff69b4;
      text-shadow: 2px 2px 8px rgba(255,105,180,0.3);
    }

    header p {
      font-size: 1.4rem;
      color: #ff1493;
      margin-top: 8px;
    }

    /* ... rest of your CSS here (copy-paste the full content) ... */

