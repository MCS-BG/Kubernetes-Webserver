<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LedgeOS Assistant</title>
<script src="config.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f1ea;
    --panel: #ffffff;
    --ink: #1c1a17;
    --muted: #6b675f;
    --accent: #1c5075;
    --accent-ink: #ffffff;
    --border: #ded8ca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15181c;
      --panel: #1e2227;
      --ink: #eceae4;
      --muted: #9a978f;
      --accent: #7fabc9;
      --accent-ink: #0f2a43;
      --border: #33383e;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 { font-size: 16px; margin: 0; }
  header span { font-size: 12px; color: var(--muted); }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; white-space: pre-wrap; line-height: 1.4; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--accent-ink); }
  .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
  .msg.error { align-self: flex-start; background: #7a2e2e; color: #fff; }
  .msg.pending { align-self: flex-start; color: var(--muted); font-style: italic; }
  form {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  #input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #mic { background: var(--panel); border: 1px solid var(--border); color: var(--ink); }
  #mic.recording { background: #b23b3b; color: #fff; }
</style>
</head>
<body>
<header>
  <h1>LedgeOS</h1>
  <span>Ledge (close &amp; reconciliation) + Sumly (P&amp;L) &mdash; ask by typing or speaking, e.g. "run the June close for Acme Ops LLC"</span>
</header>
<div id="log"></div>
<form id="form">
  <button type="button" id="mic" title="Speak instead of typing">&#127908;</button>
  <input id="input" type="text" placeholder="Ask about a close, an entity, or an exception..." autocomplete="off" />
  <button type="submit" id="send">Send</button>
</form>
<script>
(function () {
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const micBtn = document.getElementById("mic");

  const sessionId = localStorage.getItem("chat_session_id") || crypto.randomUUID();
  localStorage.setItem("chat_session_id", sessionId);
  const apiBase = window.API_BASE_URL || "";

  function addMessage(role, text) {
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;
    const pending = addMessage("pending", "Working...");

    try {
      const resp = await fetch(apiBase + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await resp.json();
      pending.remove();
      if (!resp.ok) {
        addMessage("error", data.detail || "The assistant hit an error.");
      } else {
        addMessage("assistant", data.reply);
      }
    } catch (err) {
      pending.remove();
      addMessage("error", "Could not reach the assistant: " + err.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  // Optional voice input via the Web Speech API. Degrades silently (mic
  // button hidden) in browsers that don't support it -- text input always
  // works regardless.
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.style.display = "none";
  } else {
    const recognizer = new SpeechRecognition();
    recognizer.lang = "en-US";
    recognizer.interimResults = false;

    let recording = false;
    micBtn.addEventListener("click", () => {
      if (recording) {
        recognizer.stop();
        return;
      }
      recognizer.start();
    });
    recognizer.onstart = () => {
      recording = true;
      micBtn.classList.add("recording");
    };
    recognizer.onend = () => {
      recording = false;
      micBtn.classList.remove("recording");
    };
    recognizer.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      sendMessage(transcript);
    };
    recognizer.onerror = () => {
      recording = false;
      micBtn.classList.remove("recording");
    };
  }

  addMessage(
    "assistant",
    "Hi -- I'm the close & reconciliation assistant. Ask me to run a close, list exceptions, or check a trial balance for any configured entity."
  );
  input.focus();
})();
</script>
</body>
</html>
